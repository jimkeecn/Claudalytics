apiVersion: 1

datasources:
  - name: ClickHouse
    uid: clickhouse-analytics
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    isDefault: true
    jsonData:
      defaultDatabase: claude_analytics
      port: 9000
      server: clickhouse
      username: default
      tlsSkipVerify: true
    version: 1
    editable: false
