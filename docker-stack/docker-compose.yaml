name: claude-analytics

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: claude-analytics-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - claude-analytics-clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/allow-network.xml:/etc/clickhouse-server/users.d/allow-network.xml:ro
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    environment:
      CLICKHOUSE_DB: claude_analytics
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.148.0
    container_name: claude-analytics-otel
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  hooks-server:
    build:
      context: ./hooks-server
    image: claude-analytics-hooks:latest
    container_name: claude-analytics-hooks
    ports:
      - "4319:4319"
    environment:
      OTEL_ENDPOINT: "http://otel-collector:4318/v1/logs"
      CLICKHOUSE_URL: "http://clickhouse:8123"
    volumes:
      - claude-analytics-hooks-logs:/app/logs
      - ./clickhouse/init:/app/sql:ro
    depends_on:
      otel-collector:
        condition: service_started
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: claude-analytics-grafana
    ports:
      - "3000:3000"
    volumes:
      - claude-analytics-grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

volumes:
  claude-analytics-clickhouse-data:
    name: claude-analytics-clickhouse-data
  claude-analytics-grafana-data:
    name: claude-analytics-grafana-data
  claude-analytics-hooks-logs:
    name: claude-analytics-hooks-logs
